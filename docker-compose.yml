version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-error_monitor}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/ErrorMonitor.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB:-error_monitor};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      RateLimiting__PermitLimit: ${RATE_LIMIT_PERMIT:-200}
      RateLimiting__WindowSeconds: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  dashboard:
    build:
      context: ./dashboard
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  pgdata:
